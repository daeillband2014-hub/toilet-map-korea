name: adopt-sync
on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/adopt-sync.mjs
        env:
          ANIMAL_API_KEY: ${{ secrets.ANIMAL_API_KEY }}
      - run: |
          git config user.name "adopt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add adopt/
          git diff --cached --quiet || git commit -m "adopt data $(date +%F)"
          git push
